services:
  bitcoin-knots:
    image: lscr.io/linuxserver/bitcoin-knots:latest
    container_name: bitcoin-knots
    environment:
      PUID: 99
      PGID: 100
      TZ: ${TZ:-UTC}
    volumes:
      - ${DATA_ROOT}:/config
    ports:
      - "3000:3000"
      - "3001:3001"
      - "8333:8333"
    restart: unless-stopped

# --- Example: put this stack on a custom/shared Docker network instead
# of the default bridge network (e.g. to reach a reverse proxy or talk
# to other stacks directly). Uncomment below, add the same "networks:"
# list under every service above, and create the network first if it
# doesn't already exist (docker network create <name>).
#
# networks:
#   <name>:
#     external: true
