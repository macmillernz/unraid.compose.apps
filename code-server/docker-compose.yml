services:
  code-server:
    image: lscr.io/linuxserver/code-server:latest
    container_name: code-server
    environment:
      PUID: 99
      PGID: 100
      TZ: ${TZ:-UTC}
      PASSWORD: ${PASSWORD:?required}
      HASHED_PASSWORD: ${HASHED_PASSWORD:?required}
      SUDO_PASSWORD: ${SUDO_PASSWORD:?required}
      SUDO_PASSWORD_HASH: ${SUDO_PASSWORD_HASH:?required}
      PROXY_DOMAIN: ${PROXY_DOMAIN:-code-server.my.domain}
      DEFAULT_WORKSPACE: ${DEFAULT_WORKSPACE:-/config/workspace}
      PWA_APPNAME: ${PWA_APPNAME:-code-server}
    volumes:
      - ${DATA_ROOT}:/config
    ports:
      - "8443:8443"
    restart: unless-stopped

# --- Example: put this stack on a custom/shared Docker network instead
# of the default bridge network (e.g. to reach a reverse proxy or talk
# to other stacks directly). Uncomment below, add the same "networks:"
# list under every service above, and create the network first if it
# doesn't already exist (docker network create <name>).
#
# networks:
#   <name>:
#     external: true
