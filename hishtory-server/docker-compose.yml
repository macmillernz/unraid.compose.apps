services:
  hishtory-server:
    image: lscr.io/linuxserver/hishtory-server:latest
    container_name: hishtory-server
    environment:
      PUID: 99
      PGID: 100
      TZ: ${TZ:-UTC}
      HISHTORY_POSTGRES_DB: ${HISHTORY_POSTGRES_DB:-postgresql://${HISHTORY_DB_USER}:${HISHTORY_DB_PASS}@hishtory-db:5432/hishtory?sslmode=disable}
      HISHTORY_SQLITE_DB: ${HISHTORY_SQLITE_DB:-/config/hishtory.db}
    volumes:
      - ${DATA_ROOT}:/config
    ports:
      - "8080:8080"
    restart: unless-stopped

# --- Example: put this stack on a custom/shared Docker network instead
# of the default bridge network (e.g. to reach a reverse proxy or talk
# to other stacks directly). Uncomment below, add the same "networks:"
# list under every service above, and create the network first if it
# doesn't already exist (docker network create <name>).
#
# networks:
#   <name>:
#     external: true
