services:
  openproject:
    image: openproject/openproject:${OPENPROJECT_TAG:-17}
    container_name: openproject
    environment:
      OPENPROJECT_HOST__NAME: ${OPENPROJECT_HOST__NAME:?host name required, e.g. openproject.example.com or <server-ip>:8080}
      OPENPROJECT_HTTPS: ${OPENPROJECT_HTTPS:-false}
      OPENPROJECT_DEFAULT__LANGUAGE: ${OPENPROJECT_DEFAULT__LANGUAGE:-en}
      SECRET_KEY_BASE: ${SECRET_KEY_BASE:?secret key base required}
    volumes:
      - ${DATA_ROOT}/pgdata:/var/openproject/pgdata
      - ${DATA_ROOT}/assets:/var/openproject/assets
    ports:
      - "8080:80"
    restart: unless-stopped

# --- Example: put this stack on a custom/shared Docker network instead
# of the default bridge network (e.g. to reach a reverse proxy or talk
# to other stacks directly). Uncomment below, add the same "networks:"
# list under every service above, and create the network first if it
# doesn't already exist (docker network create <name>).
#
# networks:
#   <name>:
#     external: true
