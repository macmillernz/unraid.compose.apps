services:
  planka-db:
    container_name: planka-db
    image: docker.io/library/postgres:16-alpine
    environment:
      POSTGRES_DB: ${PG_DB:-planka}
      POSTGRES_USER: ${PG_USER:-planka}
      POSTGRES_PASSWORD: ${PG_PASS:?database password required}
    healthcheck:
      interval: 30s
      retries: 5
      start_period: 20s
      test:
        - CMD-SHELL
        - pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}
      timeout: 5s
    restart: unless-stopped
    volumes:
      - ${DATA_ROOT}/db:/var/lib/postgresql/data

  planka:
    image: lscr.io/linuxserver/planka:latest
    container_name: planka
    depends_on:
      planka-db:
        condition: service_healthy
    environment:
      PUID: 99
      PGID: 100
      TZ: ${TZ:-UTC}
      BASE_URL: ${BASE_URL:?base URL required, e.g. http://<server-ip>:1337}
      DATABASE_URL: postgresql://${PG_USER:-planka}:${PG_PASS}@planka-db:5432/${PG_DB:-planka}
      SECRET_KEY: ${SECRET_KEY:?secret key required}
      TRUST_PROXY: ${TRUST_PROXY:-false}
      DEFAULT_ADMIN_EMAIL: ${DEFAULT_ADMIN_EMAIL:-demo@demo.demo}
      DEFAULT_ADMIN_USERNAME: ${DEFAULT_ADMIN_USERNAME:-demo}
      DEFAULT_ADMIN_PASSWORD: ${DEFAULT_ADMIN_PASSWORD:-demo}
      DEFAULT_ADMIN_NAME: ${DEFAULT_ADMIN_NAME:-Demo User}
      DEFAULT_LANGUAGE: ${DEFAULT_LANGUAGE:-en-US}
    volumes:
      - ${DATA_ROOT}:/config
    ports:
      - "1337:1337"
    restart: unless-stopped

# --- Example: put this stack on a custom/shared Docker network instead
# of the default bridge network (e.g. to reach a reverse proxy or talk
# to other stacks directly). Uncomment below, add the same "networks:"
# list under every service above, and create the network first if it
# doesn't already exist (docker network create <name>).
#
# networks:
#   <name>:
#     external: true
