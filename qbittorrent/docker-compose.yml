services:
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      PUID: 99
      PGID: 100
      TZ: ${TZ:-UTC}
      WEBUI_PORT: 8080
      TORRENTING_PORT: 6881
    volumes:
      - ${DATA_ROOT}:/config
      - ${DOWNLOADS_ROOT}:/downloads
    ports:
      - "8080:8080"
      - "6881:6881"
      - "6881:6881/udp"
    stop_grace_period: 10s
    restart: unless-stopped

# NOTE: qBittorrent prints a random temporary admin password to its
# container logs on first start - check `docker logs qbittorrent` and
# change it immediately in the web UI's settings.

# --- Example: put this stack on a custom/shared Docker network instead
# of the default bridge network (e.g. to reach a reverse proxy or talk
# to other stacks directly). Uncomment below, add the same "networks:"
# list under every service above, and create the network first if it
# doesn't already exist (docker network create <name>).
#
# networks:
#   <name>:
#     external: true
