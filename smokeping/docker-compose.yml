services:
  smokeping:
    image: lscr.io/linuxserver/smokeping:latest
    container_name: smokeping
    environment:
      PUID: 99
      PGID: 100
      TZ: ${TZ:-UTC}
      MASTER_URL: ${MASTER_URL:-http://<master-host-ip>:80/smokeping/}
      SHARED_SECRET: ${SHARED_SECRET:?required}
      CACHE_DIR: ${CACHE_DIR:-/tmp}
    volumes:
      - ${DATA_ROOT}:/config
      - ${DATA_DIR_ROOT}:/data
    ports:
      - "80:80"
    restart: unless-stopped

# --- Example: put this stack on a custom/shared Docker network instead
# of the default bridge network (e.g. to reach a reverse proxy or talk
# to other stacks directly). Uncomment below, add the same "networks:"
# list under every service above, and create the network first if it
# doesn't already exist (docker network create <name>).
#
# networks:
#   <name>:
#     external: true
